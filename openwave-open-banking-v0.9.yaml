openapi: 3.0.3

info:
  title: OpenWave — Open Banking API
  description: |
    # OpenWave Open Banking API v0.9 (Draft)

    This file covers the **Open Banking** module of the OpenWave standard.
    It enables regulated Third-Party Providers (TPPs) to access customer account
    data and initiate payments on behalf of customers — with explicit, revocable
    customer consent.

    Inspired by PSD2 (EU), UK Open Banking, and Saudi Arabia SAMA Open Banking.
    Designed for emerging markets where a lighter-weight, practical approach
    is preferred over the full complexity of Berlin Group or FAPI 2.0.

    ---

    ## Open Banking Roles

    | Role | Abbreviation | Description |
    |---|---|---|
    | Account Information Service Provider | AISP | Reads account data (balances, transactions) |
    | Payment Initiation Service Provider | PISP | Initiates payments from customer accounts |
    | Bank | ASPSP | Account Servicing Payment Service Provider — holds the accounts |
    | Gateway | OpenWave | Routes requests between TPPs and ASPSPs |

    ---

    ## Consent Lifecycle

    ```
    TPP → POST /ob/consents              → Create consent request
    TPP → Redirect customer to consent_url
    Customer → Approves at bank's auth UI
    Bank → Redirects to TPP redirect_uri with auth_code
    TPP → POST /ob/consents/{id}/token   → Exchange auth_code for access_token
    TPP → Use access_token for data/payment APIs
    Customer/TPP → DELETE /ob/consents/{id}  → Revoke at any time
    ```

    ---

    ## Authentication

    All TPP calls use **OAuth 2.0 Authorization Code + PKCE**:
    - TPPs register with the OpenWave gateway to get a `client_id`
    - Customer consent is obtained via redirect flow
    - Access tokens are short-lived (15 min), refresh tokens are long-lived (90 days)
    - All tokens are scoped to a specific consent

    TPP registration header: `X-OpenWave-TPP-Key: {tpp_api_key}`

    ---

    ## Scopes

    | Scope | Description |
    |---|---|
    | `accounts:read` | List accounts and basic details |
    | `balances:read` | Read account balances |
    | `transactions:read` | Read transaction history |
    | `payments:write` | Initiate single payment orders |
    | `mandates:write` | Create standing payment mandates |

    ---

    ## Amounts
    All monetary amounts are **minor unit integers** (e.g. 50000 = 500.00 LYD).
    Always include `currency` (ISO 4217) alongside any `amount` field.

    ---

    ## Status
    🚧 **Draft v0.9** — endpoints and schemas may change before v1.0.
    Feedback welcome via GitHub issues.

  version: "0.9.0"
  contact:
    name: OpenWave Standard
    url: https://github.com/openwave-standard/openwave-spec
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

externalDocs:
  description: OpenWave Standard Repository
  url: https://github.com/openwave-standard/openwave-spec

servers:
  - url: https://astro.example.com/api/v1
    description: Neptune Astro Reference Implementation
  - url: https://{gateway_host}/api/v1
    description: Any OpenWave-compliant gateway
    variables:
      gateway_host:
        default: astro.example.com

tags:
  - name: Consent
    description: TPP consent lifecycle — create, authorize, revoke
  - name: Accounts
    description: AISP — read account list and details
  - name: Balances
    description: AISP — read account balances
  - name: Transactions
    description: AISP — read transaction history
  - name: Payment Orders
    description: PISP — initiate single payments
  - name: TPP Registration
    description: Register and manage TPP applications

# =============================================================================
# PATHS
# =============================================================================

paths:

  # ---------------------------------------------------------------------------
  # TPP REGISTRATION
  # ---------------------------------------------------------------------------

  /ob/tpp/register:
    post:
      tags: [TPP Registration]
      summary: Register a Third-Party Provider application
      description: |
        Registers a TPP with the OpenWave gateway. Returns `client_id` and
        `client_secret` used for OAuth flows.
        In production this is typically an admin-only operation with manual review.
      operationId: registerTpp
      security:
        - TppAdminKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTppRequest'
      responses:
        '201':
          description: TPP registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TppRegistrationResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------------------
  # CONSENT
  # ---------------------------------------------------------------------------

  /ob/consents:
    post:
      tags: [Consent]
      summary: Create a consent request
      description: |
        TPP creates a consent request specifying which scopes it needs and which
        accounts (if known). Returns a `consent_url` to redirect the customer to.
        The customer authenticates at their bank and grants or denies consent.
      operationId: createConsent
      security:
        - TppOAuth: [accounts:read, balances:read, transactions:read, payments:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentRequest'
            example:
              scopes: [accounts:read, balances:read, transactions:read]
              redirect_uri: https://myapp.com/ob/callback
              bank_handle: andalus
              state: random_csrf_state_abc
              expiry_days: 90
      responses:
        '201':
          description: Consent request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /ob/consents/{consent_id}:
    get:
      tags: [Consent]
      summary: Get consent details and status
      operationId: getConsent
      security:
        - TppOAuth: []
      parameters:
        - $ref: '#/components/parameters/ConsentId'
      responses:
        '200':
          description: Consent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Consent]
      summary: Revoke consent
      description: |
        Revokes an active consent. Can be called by the TPP or the customer
        (via their banking app). After revocation all access tokens for this
        consent are immediately invalidated.
      operationId: revokeConsent
      security:
        - TppOAuth: []
      parameters:
        - $ref: '#/components/parameters/ConsentId'
      responses:
        '200':
          description: Consent revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'

  /ob/consents/{consent_id}/token:
    post:
      tags: [Consent]
      summary: Exchange authorization code for access token
      description: |
        After the customer grants consent and is redirected back with `auth_code`,
        the TPP exchanges it for an `access_token` and `refresh_token`.
        Standard OAuth 2.0 Authorization Code + PKCE exchange.
      operationId: exchangeConsentToken
      security:
        - TppOAuth: []
      parameters:
        - $ref: '#/components/parameters/ConsentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenExchangeRequest'
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # ACCOUNTS (AISP)
  # ---------------------------------------------------------------------------

  /ob/accounts:
    get:
      tags: [Accounts]
      summary: List accounts covered by consent
      description: |
        Returns all accounts the customer has authorised access to under the
        current consent. Requires `accounts:read` scope.
      operationId: listAccounts
      security:
        - TppOAuth: [accounts:read]
      parameters:
        - $ref: '#/components/parameters/ConsentHeader'
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /ob/accounts/{account_id}:
    get:
      tags: [Accounts]
      summary: Get account details
      operationId: getAccount
      security:
        - TppOAuth: [accounts:read]
      parameters:
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/ConsentHeader'
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # BALANCES (AISP)
  # ---------------------------------------------------------------------------

  /ob/accounts/{account_id}/balances:
    get:
      tags: [Balances]
      summary: Get account balances
      description: |
        Returns current and available balances for the account.
        Requires `balances:read` scope.
      operationId: getBalances
      security:
        - TppOAuth: [balances:read]
      parameters:
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/ConsentHeader'
      responses:
        '200':
          description: Account balances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalancesResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ---------------------------------------------------------------------------
  # TRANSACTIONS (AISP)
  # ---------------------------------------------------------------------------

  /ob/accounts/{account_id}/transactions:
    get:
      tags: [Transactions]
      summary: Get transaction history
      description: |
        Returns paginated transaction history for the account.
        Requires `transactions:read` scope.
        Date range is limited to the consent's authorised period.
      operationId: getTransactions
      security:
        - TppOAuth: [transactions:read]
      parameters:
        - $ref: '#/components/parameters/AccountId'
        - $ref: '#/components/parameters/ConsentHeader'
        - name: from_date
          in: query
          schema:
            type: string
            format: date
            example: "2026-01-01"
          description: Start date (inclusive), ISO 8601 date
        - name: to_date
          in: query
          schema:
            type: string
            format: date
            example: "2026-04-23"
          description: End date (inclusive)
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ---------------------------------------------------------------------------
  # PAYMENT ORDERS (PISP)
  # ---------------------------------------------------------------------------

  /ob/payment-orders:
    post:
      tags: [Payment Orders]
      summary: Initiate a payment order
      description: |
        TPP initiates a payment from a customer's account to a beneficiary.
        Requires `payments:write` scope and an active consent covering the
        debtor account.

        The payment may require additional Strong Customer Authentication (SCA)
        depending on the bank's policy. If required, the response includes a
        `sca_url` to redirect the customer.
      operationId: createPaymentOrder
      security:
        - TppOAuth: [payments:write]
      parameters:
        - $ref: '#/components/parameters/ConsentHeader'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentOrderRequest'
            example:
              debtor_iban: LY83002700100020200590
              creditor_iban: LY83002700100099900001
              creditor_name: Landlord Properties LLC
              amount: 150000
              currency: LYD
              description: Rent April 2026
              merchant_reference: RENT-2026-04
      responses:
        '201':
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /ob/payment-orders/{order_id}:
    get:
      tags: [Payment Orders]
      summary: Get payment order status
      operationId: getPaymentOrder
      security:
        - TppOAuth: [payments:write]
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ConsentHeader'
      responses:
        '200':
          description: Payment order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentOrderResponse'
        '404':
          $ref: '#/components/responses/NotFound'

# =============================================================================
# COMPONENTS
# =============================================================================

components:

  securitySchemes:
    TppOAuth:
      type: oauth2
      description: OAuth 2.0 Authorization Code + PKCE for TPP access
      flows:
        authorizationCode:
          authorizationUrl: https://astro.example.com/ob/auth
          tokenUrl: https://astro.example.com/ob/token
          scopes:
            accounts:read: Read account list and details
            balances:read: Read account balances
            transactions:read: Read transaction history
            payments:write: Initiate payment orders
            mandates:write: Create standing payment mandates
    TppAdminKey:
      type: apiKey
      in: header
      name: X-OpenWave-TPP-Key
      description: Admin key for TPP registration (issued by gateway operator)

  parameters:
    ConsentId:
      name: consent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Consent UUID
    AccountId:
      name: account_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Account UUID (from /ob/accounts list)
    ConsentHeader:
      name: X-Consent-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Active consent UUID that authorises this request
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 64
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

  schemas:

    # --- Enums ---

    ConsentStatus:
      type: string
      enum:
        - AWAITING_AUTHORISATION
        - AUTHORISED
        - REJECTED
        - REVOKED
        - EXPIRED

    PaymentOrderStatus:
      type: string
      enum:
        - PENDING
        - PENDING_SCA
        - ACCEPTED
        - COMPLETED
        - REJECTED
        - FAILED

    TransactionType:
      type: string
      enum:
        - DEBIT
        - CREDIT

    BalanceType:
      type: string
      enum:
        - CURRENT
        - AVAILABLE
        - PENDING

    # --- TPP Registration ---

    RegisterTppRequest:
      type: object
      required: [name, redirect_uris, contact_email]
      properties:
        name:
          type: string
          description: Application display name
          example: MyFinApp
        description:
          type: string
          example: Personal finance management app
        redirect_uris:
          type: array
          minItems: 1
          items:
            type: string
            format: uri
          example:
            - https://myfinapp.com/ob/callback
        contact_email:
          type: string
          format: email
        website:
          type: string
          format: uri
        scopes_requested:
          type: array
          items:
            type: string
          example: [accounts:read, balances:read, transactions:read]
        logo_url:
          type: string
          format: uri

    TppRegistrationResponse:
      type: object
      properties:
        client_id:
          type: string
          format: uuid
        client_secret:
          type: string
          description: Store securely — shown only once
        name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        registered_at:
          type: string
          format: date-time

    # --- Consent ---

    CreateConsentRequest:
      type: object
      required: [scopes, redirect_uri, bank_handle]
      properties:
        scopes:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - accounts:read
              - balances:read
              - transactions:read
              - payments:write
              - mandates:write
          example: [accounts:read, balances:read, transactions:read]
        redirect_uri:
          type: string
          format: uri
          description: TPP's callback URL after customer authorises
          example: https://myapp.com/ob/callback
        bank_handle:
          type: string
          description: Target bank (the ASPSP holding customer accounts)
          example: andalus
        state:
          type: string
          description: CSRF protection state value (returned unchanged in redirect)
          example: random_csrf_state_abc
        code_challenge:
          type: string
          description: PKCE code challenge (Base64URL SHA-256 of code_verifier)
        code_challenge_method:
          type: string
          enum: [S256]
          default: S256
        expiry_days:
          type: integer
          default: 90
          maximum: 365
          description: How long the consent should remain valid once authorised
        account_ibans:
          type: array
          items:
            type: string
          description: Optional — pre-select specific accounts. If omitted, customer chooses.
          example: [LY83002700100020200590]

    ConsentResponse:
      type: object
      properties:
        consent_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ConsentStatus'
        scopes:
          type: array
          items:
            type: string
        bank_handle:
          type: string
        consent_url:
          type: string
          format: uri
          description: Redirect customer here for authorisation (present when AWAITING_AUTHORISATION)
          nullable: true
        authorised_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    TokenExchangeRequest:
      type: object
      required: [auth_code, redirect_uri, code_verifier]
      properties:
        auth_code:
          type: string
          description: Authorization code received from redirect callback
        redirect_uri:
          type: string
          format: uri
        code_verifier:
          type: string
          description: PKCE code verifier (plain text — gateway verifies against challenge)

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 900
        refresh_token:
          type: string
        refresh_token_expires_in:
          type: integer
          description: Refresh token lifetime in seconds
          example: 7776000
        scope:
          type: string
          example: "accounts:read balances:read transactions:read"
        consent_id:
          type: string
          format: uuid

    # --- Accounts ---

    Account:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        iban:
          type: string
          example: LY83002700100020200590
        account_name:
          type: string
          example: Mohamed Tellesy — Current Account
        currency:
          type: string
          example: LYD
        account_type:
          type: string
          enum: [CURRENT, SAVINGS, LOAN, INVESTMENT]
        bank_handle:
          type: string
          example: andalus
        bank_name:
          type: string
          example: Andalus Bank
        is_default:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, DORMANT, CLOSED, FROZEN]

    AccountListResponse:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        consent_id:
          type: string
          format: uuid

    # --- Balances ---

    Balance:
      type: object
      properties:
        balance_type:
          $ref: '#/components/schemas/BalanceType'
        amount:
          type: integer
          format: int64
          description: Balance in minor units
          example: 2500000
        currency:
          type: string
          example: LYD
        as_of:
          type: string
          format: date-time

    BalancesResponse:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        iban:
          type: string
        balances:
          type: array
          items:
            $ref: '#/components/schemas/Balance'

    # --- Transactions ---

    Transaction:
      type: object
      properties:
        transaction_id:
          type: string
        booking_date:
          type: string
          format: date
        value_date:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/TransactionType'
        amount:
          type: integer
          format: int64
          description: Amount in minor units (always positive)
        currency:
          type: string
        description:
          type: string
        reference:
          type: string
          description: Bank transaction reference
        counterparty_name:
          type: string
          nullable: true
        counterparty_iban:
          type: string
          nullable: true
        balance_after:
          type: integer
          format: int64
          nullable: true
          description: Account balance after this transaction in minor units

    TransactionListResponse:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        from_date:
          type: string
          format: date
        to_date:
          type: string
          format: date

    # --- Payment Orders ---

    CreatePaymentOrderRequest:
      type: object
      required:
        - debtor_iban
        - creditor_iban
        - creditor_name
        - amount
        - currency
        - description
      properties:
        debtor_iban:
          type: string
          description: Customer's account to debit (must be covered by consent)
          example: LY83002700100020200590
        creditor_iban:
          type: string
          description: Beneficiary account IBAN
          example: LY83002700100099900001
        creditor_name:
          type: string
          description: Beneficiary name
          example: Landlord Properties LLC
        amount:
          type: integer
          format: int64
          description: Amount in minor units
          example: 150000
        currency:
          type: string
          example: LYD
        description:
          type: string
          maxLength: 255
          example: Rent April 2026
        merchant_reference:
          type: string
          maxLength: 128
          description: TPP's internal reference
          example: RENT-2026-04
        scheduled_date:
          type: string
          format: date
          nullable: true
          description: Optional future date to execute payment. Omit for immediate execution.
        metadata:
          type: object
          additionalProperties: true

    PaymentOrderResponse:
      type: object
      properties:
        order_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/PaymentOrderStatus'
        debtor_iban_masked:
          type: string
          example: LY83****0590
        creditor_iban:
          type: string
        creditor_name:
          type: string
        amount:
          type: integer
          format: int64
        currency:
          type: string
        description:
          type: string
        sca_url:
          type: string
          format: uri
          nullable: true
          description: Redirect customer here for Strong Customer Authentication (if required by bank)
        transfer_reference:
          type: string
          nullable: true
          description: Bank transfer reference (available when COMPLETED)
        merchant_reference:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    # --- Error ---

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: CONSENT_EXPIRED
        message:
          type: string
          example: The consent has expired. Request a new consent.
        details:
          type: object
          additionalProperties: true
          nullable: true

  responses:
    BadRequest:
      description: Invalid request payload or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Consent does not cover this scope or account
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# =============================================================================
# WEBHOOK EVENTS (Open Banking)
# =============================================================================
# All webhooks follow the standard OpenWave envelope:
# {
#   "event": "consent.granted",
#   "gateway": "neptune-astro",
#   "api_version": "0.9.0",
#   "timestamp": "2026-04-23T20:00:00Z",
#   "data": { ... }
# }
#
# Event Types:
